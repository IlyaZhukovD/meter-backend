services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: meters
      POSTGRES_USER: meters
      POSTGRES_PASSWORD: meters
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9003:9001"
    volumes:
      - minio_data:/data

  backend:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - minio
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/meters
      MINIO_URL: http://minio:9000

volumes:
  postgres_data:
  minio_data:
